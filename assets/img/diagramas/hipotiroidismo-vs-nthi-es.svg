        <dc:subject>hipotiroidismo canino; síndrome del eutiroideo enfermo; NTIS; T4; cTSH; T4 libre; diagnóstico diferencial; dermatosis endocrina; sobrediagnóstico</dc:subject>
        <dc:description>Tabla comparativa de orientación diferencial entre hipotiroidismo primario y NTIS en el perro. Autora clínica: Dra. Jessica Ysabel Camacho García.</dc:description>
