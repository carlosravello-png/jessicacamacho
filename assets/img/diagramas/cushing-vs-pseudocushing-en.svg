<svg xmlns="http://www.w3.org/2000/svg" xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:cc="http://creativecommons.org/ns#" viewBox="0 0 820 640" width="820" height="640" role="img" aria-labelledby="t d" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <title id="t">Differential diagnosis: true Cushing's vs. pseudo-Cushing in the dog — Dr. Jessica Camacho García</title>
  <desc id="d">Comparative table for the differential between true hyperadrenocorticism (organic cause: pituitary or adrenal neoplasia; complete systemic picture; reproducible tests; persistent course) and functional hypercortisolemia or pseudo-Cushing (reactive to stress or illness; incomplete picture; false-positive tests; improves on controlling the underlying cause). Rule: do not perform Cushing's testing in a stressed or ill patient. Clinical content by Dr. Jessica Ysabel Camacho García, CMVP 12434, ORCID 0009-0002-6837-5311. Design © Carlos Eduardo Ravello Joo.</desc>
