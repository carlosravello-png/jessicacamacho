  <rect width="820" height="600" fill="#FFFFFF"/>

  <text x="410" y="38" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="24" font-weight="700" fill="#3F2366">Hipotiroidismo primario frente a NTIS</text>
  <text x="410" y="64" text-anchor="middle" font-size="13.5" fill="#6A7181">Diferenciar la enfermedad glandular del eutiroideo enfermo ante una T4 baja</text>

  <rect x="30" y="84" width="200" height="44" fill="#F8F5FB" stroke="#EBE6F3"/>
  <text x="44" y="111" font-size="12.5" font-weight="700" fill="#6A7181">Parámetro</text>
  <rect x="230" y="84" width="292" height="44" fill="#6B3FA0"/>
  <text x="376" y="111" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Hipotiroidismo primario</text>
  <rect x="522" y="84" width="268" height="44" fill="#5B6B8C"/>
  <text x="656" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Eutiroideo enfermo</text>
  <text x="656" y="120" text-anchor="middle" font-size="11.5" fill="#DCE2EE">(NTIS)</text>

  <!-- r1 Causa -->
  <rect x="30" y="128" width="200" height="48" fill="#F8F5FB" stroke="#EBE6F3"/><text x="44" y="157" font-size="12.5" font-weight="600" fill="#3F2366">Causa</text>
  <rect x="230" y="128" width="292" height="48" fill="#FFFFFF" stroke="#EBE6F3"/><text x="244" y="157" font-size="12.5" fill="#333944">Enfermedad glandular tiroidea</text>
  <rect x="522" y="128" width="268" height="48" fill="#FFFFFF" stroke="#EBE6F3"/><text x="536" y="157" font-size="12.5" fill="#333944">Enfermedad sistémica o estrés</text>
  <!-- r2 T4 total -->
  <rect x="30" y="176" width="200" height="44" fill="#F8F5FB" stroke="#EBE6F3"/><text x="44" y="203" font-size="12.5" font-weight="600" fill="#3F2366">T4 total</text>
  <rect x="230" y="176" width="292" height="44" fill="#FFFFFF" stroke="#EBE6F3"/><text x="244" y="203" font-size="12.5" fill="#333944">Baja</text>
  <rect x="522" y="176" width="268" height="44" fill="#FFF6F6" stroke="#EBE6F3"/><text x="536" y="203" font-size="12.5" fill="#A33A3A">Baja (confusor)</text>
  <!-- r3 cTSH -->
  <rect x="30" y="220" width="200" height="44" fill="#F8F5FB" stroke="#EBE6F3"/><text x="44" y="247" font-size="12.5" font-weight="600" fill="#3F2366">cTSH</text>
  <rect x="230" y="220" width="292" height="44" fill="#FFFFFF" stroke="#EBE6F3"/><text x="244" y="247" font-size="12.5" fill="#333944">Frecuentemente elevada</text>
  <rect x="522" y="220" width="268" height="44" fill="#FFFFFF" stroke="#EBE6F3"/><text x="536" y="247" font-size="12.5" fill="#333944">Normal o baja</text>
  <!-- r4 T4 libre -->
  <rect x="30" y="264" width="200" height="44" fill="#F8F5FB" stroke="#EBE6F3"/><text x="44" y="291" font-size="12.5" font-weight="600" fill="#3F2366">T4 libre (diálisis)</text>
  <rect x="230" y="264" width="292" height="44" fill="#FFFFFF" stroke="#EBE6F3"/><text x="244" y="291" font-size="12.5" fill="#333944">Baja</text>
  <rect x="522" y="264" width="268" height="44" fill="#FFFFFF" stroke="#EBE6F3"/><text x="536" y="291" font-size="12.5" fill="#333944">Normal o levemente baja</text>
  <!-- r5 Signos cutáneos -->
  <rect x="30" y="308" width="200" height="56" fill="#F8F5FB" stroke="#EBE6F3"/><text x="44" y="340" font-size="12.5" font-weight="600" fill="#3F2366">Signos cutáneos</text>
  <rect x="230" y="308" width="292" height="56" fill="#FFFFFF" stroke="#EBE6F3"/><text x="244" y="332" font-size="12.5" fill="#333944">Dermatosis típica</text><text x="244" y="349" font-size="12.5" fill="#333944">(cola de rata, mixedema)</text>
  <rect x="522" y="308" width="268" height="56" fill="#FFFFFF" stroke="#EBE6F3"/><text x="536" y="332" font-size="12.5" fill="#333944">Sin dermatosis tiroidea</text><text x="536" y="349" font-size="12.5" fill="#333944">típica</text>
  <!-- r6 Evolución -->
  <rect x="30" y="364" width="200" height="56" fill="#F8F5FB" stroke="#EBE6F3"/><text x="44" y="396" font-size="12.5" font-weight="600" fill="#3F2366">Evolución / re-test</text>
  <rect x="230" y="364" width="292" height="56" fill="#FFFFFF" stroke="#EBE6F3"/><text x="244" y="388" font-size="12.5" fill="#333944">Persiste; responde a</text><text x="244" y="405" font-size="12.5" fill="#333944">levotiroxina</text>
  <rect x="522" y="364" width="268" height="56" fill="#F1FBF3" stroke="#EBE6F3"/><text x="536" y="388" font-size="12.5" fill="#1B5E20">Normaliza en 2–4</text><text x="536" y="405" font-size="12.5" fill="#1B5E20">semanas</text>

  <!-- Banner -->
  <rect x="30" y="438" width="760" height="50" rx="8" fill="#F8F5FB" stroke="#6B3FA0"/>
  <text x="410" y="462" text-anchor="middle" font-size="13.5" font-weight="600" font-style="italic" fill="#3F2366">Regla: no testear la tiroides en un paciente enfermo o estresado.</text>
  <text x="410" y="479" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6A7181">Ante T4 baja con enfermedad de base, re-testear 2–4 semanas tras la recuperación.</text>

  <!-- Footer -->
  <line x1="30" y1="520" x2="790" y2="520" stroke="#EBE6F3" stroke-width="1"/>
  <text x="410" y="540" text-anchor="middle" font-size="12" font-weight="600" fill="#3F2366">Contenido clínico: Dra. Jessica Ysabel Camacho García, MV · CMVP 12434 · ORCID 0009-0002-6837-5311</text>
