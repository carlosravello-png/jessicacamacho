<svg xmlns="http://www.w3.org/2000/svg" xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:cc="http://creativecommons.org/ns#" viewBox="0 0 820 640" width="820" height="640" role="img" aria-labelledby="t d" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <title id="t">Diagnóstico diferencial Cushing verdadero vs. pseudo-Cushing en el perro — Dra. Jessica Camacho García</title>
  <desc id="d">Tabla comparativa de orientación diferencial entre hiperadrenocorticismo verdadero (causa orgánica: neoplasia hipofisaria o adrenal; cuadro sistémico completo; pruebas reproducibles; evolución persistente) e hipercortisolemia funcional o pseudo-Cushing (reactiva a estrés o enfermedad; cuadro incompleto; falsos positivos en pruebas; mejora al controlar la base). Regla: no realizar pruebas de Cushing en un paciente estresado o enfermo. Contenido clínico de la Dra. Jessica Ysabel Camacho García, CMVP 12434, ORCID 0009-0002-6837-5311. Diseño © Carlos Eduardo Ravello Joo.</desc>
  <metadata>
