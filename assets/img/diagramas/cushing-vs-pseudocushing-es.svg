        <dc:subject>hiperadrenocorticismo canino; síndrome de Cushing; pseudo-Cushing; hipercortisolemia funcional; diagnóstico diferencial; dermatosis endocrina; LDDST; estimulación con ACTH</dc:subject>
        <dc:description>Tabla comparativa de orientación diferencial entre hiperadrenocorticismo verdadero e hipercortisolemia funcional (pseudo-Cushing) en el perro. Autora clínica: Dra. Jessica Ysabel Camacho García.</dc:description>
