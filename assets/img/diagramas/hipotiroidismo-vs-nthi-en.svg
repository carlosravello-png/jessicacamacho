<svg xmlns="http://www.w3.org/2000/svg" xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:cc="http://creativecommons.org/ns#" viewBox="0 0 820 600" width="820" height="600" role="img" aria-labelledby="t d" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <title id="t">Differential diagnosis: primary hypothyroidism vs. non-thyroidal illness syndrome (NTIS) in the dog — Dr. Jessica Camacho García</title>
  <desc id="d">Comparative table between primary hypothyroidism (thyroid gland disease; low total T4; cTSH often elevated; low free T4; typical dermatosis; persistent, responds to levothyroxine) and non-thyroidal illness syndrome or NTIS (systemic illness or stress; low total T4 as a confounder; normal or low cTSH; normal or mildly low free T4; no typical dermatosis; normalizes within 2 to 4 weeks). Rule: do not test the thyroid in a stressed or ill patient; re-test after recovery. Clinical content by Dr. Jessica Ysabel Camacho García, CMVP 12434, ORCID 0009-0002-6837-5311. Design © Carlos Eduardo Ravello Joo.</desc>
