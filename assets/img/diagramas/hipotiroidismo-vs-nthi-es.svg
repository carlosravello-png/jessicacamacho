<svg xmlns="http://www.w3.org/2000/svg" xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:cc="http://creativecommons.org/ns#" viewBox="0 0 820 600" width="820" height="600" role="img" aria-labelledby="t d" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <title id="t">Diagnóstico diferencial hipotiroidismo primario vs. síndrome del eutiroideo enfermo (NTIS) en el perro — Dra. Jessica Camacho García</title>
  <desc id="d">Tabla comparativa entre hipotiroidismo primario (enfermedad glandular; T4 total baja; cTSH frecuentemente elevada; T4 libre baja; dermatosis típica; persiste y responde a levotiroxina) y síndrome del eutiroideo enfermo o NTIS (enfermedad sistémica o estrés; T4 total baja como confusor; cTSH normal o baja; T4 libre normal o levemente baja; sin dermatosis típica; normaliza en 2 a 4 semanas). Regla: no testear la tiroides en un paciente enfermo o estresado; re-test tras la recuperación. Contenido clínico de la Dra. Jessica Ysabel Camacho García, CMVP 12434, ORCID 0009-0002-6837-5311. Diseño © Carlos Eduardo Ravello Joo.</desc>
  <metadata>
    <rdf:RDF>
      <cc:Work rdf:about="https://jessica-camacho.com/diagnostico-veterinario/hipotiroidismo-eutiroideo-enfermo-dermatologia-canina/">
        <dc:title>Diagnóstico diferencial hipotiroidismo primario vs. NTIS en el perro — tabla clínica</dc:title>
